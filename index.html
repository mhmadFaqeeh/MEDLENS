<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLens - فحص الدواء الذكي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { color: #28a745; font-size: 24px; }
        #video { width: 100%; border-radius: 15px; border: 3px solid #28a745; margin-bottom: 10px; transform: scaleX(-1); }
        .btn-capture { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-capture:active { transform: scale(0.95); background: #218838; }
        .result-card { background: #e9f7ef; margin-top: 20px; padding: 15px; border-radius: 15px; text-align: right; border-right: 5px solid #28a745; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #loading { color: #666; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>MedLens - عدسة الدواء</h1>
        <p>وجّه الكاميرا نحو اسم الدواء بوضوح</p>
        
        <video id="video" autoplay playsinline></video>
        <button class="btn-capture" id="snap">📸 افحص الدواء الآن</button>
        
        <div id="loading" style="display:none;">⏳ جاري تحليل الصورة...</div>
        <div id="result-area"></div>
        
        <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    </div>

    <script>
        const video = document.getElementById('video');
        const snap = document.getElementById('snap');
        const resultArea = document.getElementById('result-area');
        const loading = document.getElementById('loading');

        // طلب الكاميرا الخلفية (للموبايلات)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("لا يمكن فتح الكاميرا: " + err); });

        snap.addEventListener('click', () => {
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            const imageData = canvas.toDataURL('image/png');

            loading.style.display = 'block';
            resultArea.innerHTML = '';

            fetch('/process_image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            })
            .then(res => res.json())
            .then(data => {
                loading.style.display = 'none';
                if(data.success) {
                    resultArea.innerHTML = `
                        <div class="result-card">
                            <h2 style="color:#28a745; margin-top:0;">${data.name}</h2>
                            <p><b>وصف الدواء:</b> ${data.description}</p>
                            <p><b>طريقة الاستخدام:</b> ${data.usage}</p>
                            <p style="color:#d9534f;"><b>⚠️ تحذيرات:</b> ${data.warnings}</p>
                        </div>`;
                } else {
                    resultArea.innerHTML = `<p style="color:red;">عذراً، لم أستطع تمييز الدواء. حاول تقريب الكاميرا أكثر.</p>`;
                }
            });
        });
    </script>
</body>
</html>
