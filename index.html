<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLens 💊</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f8f9fa; margin: 0; }
        .container { padding: 20px; }
        #video {
            width: 100%; max-width: 500px;
            border-radius: 15px; border: 3px solid #007bff;
            transform: none !important; /* لضمان عدم قلب الصورة */
            object-fit: cover;
        }
        .btn {
            background-color: #007bff; color: white; padding: 15px 30px;
            border: none; border-radius: 30px; font-size: 18px; margin-top: 20px;
        }
        #result { margin-top: 20px; padding: 15px; background: white; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color:#007bff;">💊 MedLens</h2>
        <video id="video" autoplay playsinline></video>
        <button id="capture" class="btn">إفحص الدواء الآن</button>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="result">المعلومات ستظهر هنا</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const resultDiv = document.getElementById('result');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { resultDiv.innerHTML = "يرجى تفعيل الكاميرا."; });

        document.getElementById('capture').addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/png');
            resultDiv.innerHTML = "جاري التحليل... ⏳";

            fetch('/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = `<h3>${data.name}</h3><p>${data.usage}</p>`;
                } else {
                    resultDiv.innerHTML = `<p style="color:red;">${data.message}</p>`;
                }
            })
            .catch(err => {
                resultDiv.innerHTML = "خطأ: تأكد أن ngrok والسيرفر يعملان.";
            });
        });
    </script>
</body>
</html>
