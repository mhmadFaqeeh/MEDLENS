<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLens AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-layer"></div>

    <div class="glass-container" id="auth-section">
        <h1 id="title">MedLens AI</h1>
        <p id="subtitle">نظام التعرف الذكي</p>
        <button class="apple-btn" onclick="toggleLang()">English / العربية</button>
        <form id="login-form">
            <input type="text" id="user" placeholder="اسم المستخدم">
            <button type="submit" class="apple-btn">دخول</button>
        </form>
    </div>

    <div class="glass-container hidden" id="dashboard">
        <video id="video" autoplay playsinline></video>
        <button class="apple-btn" id="capture">فحص الدواء</button>
        <div id="result-box" class="hidden" style="margin-top:20px;">
            <h3 id="res-name"></h3>
            <button class="apple-btn" onclick="speakText()">🔊 استماع</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
