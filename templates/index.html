<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLens</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-layer"></div>
    <div class="grid-layer"></div>

    <section id="auth-section" class="container">
        <div class="logo-mark">ML</div>
        <h2 style="margin-bottom: 5px;">MedLens</h2>
        <p style="opacity: 0.7; font-size: 14px; margin-bottom: 20px;">Smart Medicine Recognition</p>

        <form id="login-form">
            <input type="text" id="username" placeholder="اسم المستخدم" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit" class="primary-btn">دخول للنظام</button>
        </form>
    </section>

    <section id="user-dashboard" class="container hidden">
        <h2>لوحة الفحص</h2>
        <video id="video" autoplay playsinline></video>
        <button id="scan-btn" class="primary-btn">ابدأ الفحص</button>
    </section>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
